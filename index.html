<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Mensuales</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="apple-touch-icon" href="img/icon-192.png">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
</head>
<body>
    <div class="container">
        <h1>💰 Gastos Mensuales</h1>
        
        <div class="alarm-config">
            <h3>⏰ Alarma Diaria</h3>
            <label>Hora del recordatorio:</label>
            <input type="time" id="alarmTime" value="09:00">
            <button class="alarm-btn" onclick="setAlarm()">Activar Alarma</button>
            <button id="permisoBtn" class="alarm-btn" style="background:#4a4a6a;display:none" onclick="solicitarPermiso()">Dar permiso de notificaciones</button>
            <div class="alarm-status" id="alarmStatus"></div>
        </div>
        
        <div class="perfiles">
            <button class="perfil-btn active" onclick="selectPerfil('elias')">👤 Elias</button>
            <button class="perfil-btn" onclick="selectPerfil('nadia')">💕 Nadia</button>
        </div>
        
        <div class="form-group">
            <input type="date" id="fecha">
        </div>
        
        <div class="form-group">
            <input type="text" id="descripcion" placeholder="Descripción del gasto">
        </div>
        
        <div class="form-group">
            <input type="number" id="monto" placeholder="Monto" step="0.01">
        </div>
        
        <div class="form-group">
            <select id="tipo">
                <option value="gasto">Gasto</option>
                <option value="ingreso">Ingreso</option>
            </select>
        </div>

        <div class="form-group">
            <select id="categoria">
                <option value="casa">🏠 Casa</option>
                <option value="tarjeta">💳 Tarjeta</option>
                <option value="vehiculo">🚗 Vehículo</option>
                <option value="comida">🍔 Comida</option>
                <option value="salidas">🎉 Salidas</option>
                <option value="gastos innecesarios">❌ Gastos innecesarios</option>
                <option value="gimnasio">💪 Gimnasio</option>
                <option value="otros">📦 Otros</option>
            </select>
        </div>
        
        <button class="btn-agregar" onclick="agregarGasto()">Agregar</button>
        
        <div class="resumen">
            <div class="resumen-item">
                <span>Elias</span>
                <div>Gastos: <strong id="gastosElias" style="color:#ff6b6b">$0</strong></div>
                <div>Ingresos: <strong id="ingresosElias" style="color:#6bff8a">$0</strong></div>
                <strong id="totalElias">$0</strong>
            </div>
            <div class="resumen-item">
                <span>Nadia</span>
                <div>Gastos: <strong id="gastosNadia" style="color:#ff6b6b">$0</strong></div>
                <div>Ingresos: <strong id="ingresosNadia" style="color:#6bff8a">$0</strong></div>
                <strong id="totalNadia">$0</strong>
            </div>
            <div class="resumen-item">
                <span>Total</span>
                <strong id="totalGeneral">$0</strong>
            </div>
        </div>
        
        <div class="gastos-lista" id="gastosLista"></div>
    </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB-XVV-cNS8YGCeR_DaohbngUE1pyALhtw",
  authDomain: "app-gastos-b153f.firebaseapp.com",
  projectId: "app-gastos-b153f",
  storageBucket: "app-gastos-b153f.firebasestorage.app",
  messagingSenderId: "828630647054",
  appId: "1:828630647054:web:aa4d0135a6ab904176575f"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(app);
const gastosCollection = db.collection('gastos');

let gastos = [];
let perfilActual = 'elias';
let alarmaActiva = false;
let alarmTimeout = null;

function selectPerfil(perfil) {
    perfilActual = perfil;
    document.querySelectorAll('.perfil-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`button[onclick="selectPerfil('${perfil}')"]`).classList.add('active');
    renderGastos();
}

async function agregarGasto() {
    const descripcion = document.getElementById('descripcion').value.trim();
    const monto = parseFloat(document.getElementById('monto').value);
    const tipo = document.getElementById('tipo').value;
    const fechaInput = document.getElementById('fecha').value;
    const categoria = document.getElementById('categoria').value;

    if (!descripcion || isNaN(monto) || monto <= 0) {
        alert('Ingresa una descripción y monto válido');
        return;
    }

    const gasto = {
        id: Date.now().toString(),
        perfil: perfilActual,
        descripcion,
        monto: tipo === 'ingreso' ? Math.abs(monto) : -Math.abs(monto),
        tipo,
        categoria,
        fecha: fechaInput ? new Date(fechaInput).toLocaleDateString('es-ES') : new Date().toLocaleDateString('es-ES')
    };

    try {
        await gastosCollection.add(gasto);
        document.getElementById('descripcion').value = '';
        document.getElementById('monto').value = '';
        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
    } catch (error) {
        console.error('Error al agregar:', error);
        alert('Error: ' + error.message);
    }
}

async function eliminarGasto(id) {
    await gastosCollection.doc(id).delete();
}

function renderGastos() {
    const lista = document.getElementById('gastosLista');
    const gastosPerfil = gastos.filter(g => g.perfil === perfilActual);

    if (gastosPerfil.length === 0) {
        lista.innerHTML = '<div class="empty">No hay gastos registrados</div>';
        return;
    }

    lista.innerHTML = gastosPerfil
        .sort((a, b) => parseInt(b.id) - parseInt(a.id))
        .map(g => `
            <div class="gasto-item">
                <div class="gasto-info">
                    <div class="gasto-nombre">${g.descripcion}</div>
                    <div class="gasto-fecha">${g.fecha} • ${g.categoria}</div>
                </div>
                <div class="gasto-monto ${g.tipo === 'ingreso' ? 'ingreso' : ''}">
                    ${g.tipo === 'ingreso' ? '+' : ''}$${Math.abs(g.monto).toFixed(2)}
                </div>
                <button class="btn-eliminar" onclick="eliminarGasto('${g.id}')">×</button>
            </div>
        `).join('');
}

function actualizarResumen() {
    const eliasGastos = gastos.filter(g => g.perfil === 'elias' && g.tipo === 'gasto').reduce((sum, g) => sum + Math.abs(g.monto), 0);
    const eliasIngresos = gastos.filter(g => g.perfil === 'elias' && g.tipo === 'ingreso').reduce((sum, g) => sum + Math.abs(g.monto), 0);
    const elias = eliasIngresos - eliasGastos;
    
    const nadiaGastos = gastos.filter(g => g.perfil === 'nadia' && g.tipo === 'gasto').reduce((sum, g) => sum + Math.abs(g.monto), 0);
    const nadiaIngresos = gastos.filter(g => g.perfil === 'nadia' && g.tipo === 'ingreso').reduce((sum, g) => sum + Math.abs(g.monto), 0);
    const nadia = nadiaIngresos - nadiaGastos;
    
    document.getElementById('gastosElias').textContent = `$${eliasGastos.toFixed(2)}`;
    document.getElementById('ingresosElias').textContent = `$${eliasIngresos.toFixed(2)}`;
    document.getElementById('totalElias').textContent = elias >= 0 ? `+$${elias.toFixed(2)}` : `-$${Math.abs(elias).toFixed(2)}`;
    document.getElementById('gastosNadia').textContent = `$${nadiaGastos.toFixed(2)}`;
    document.getElementById('ingresosNadia').textContent = `$${nadiaIngresos.toFixed(2)}`;
    document.getElementById('totalNadia').textContent = nadia >= 0 ? `+$${nadia.toFixed(2)}` : `-$${Math.abs(nadia).toFixed(2)}`;
    document.getElementById('totalGeneral').textContent = `$${(elias + nadia).toFixed(2)}`;
    
    document.getElementById('totalElias').style.color = elias >= 0 ? '#6bff8a' : '#ff6b6b';
    document.getElementById('totalNadia').style.color = nadia >= 0 ? '#6bff8a' : '#ff6b6b';
}

function setAlarm() {
    const timeInput = document.getElementById('alarmTime').value;
    const status = document.getElementById('alarmStatus');
    
    if (!timeInput) {
        alert('Selecciona una hora');
        return;
    }

    if (alarmaActiva) {
        clearTimeout(alarmTimeout);
        alarmaActiva = false;
        status.textContent = '';
        document.querySelector('.alarm-btn').textContent = 'Activar Alarma';
        localStorage.removeItem('alarmTime');
        return;
    }

    if (Notification.permission !== 'granted') {
        solicitarPermiso();
        return;
    }

    activarAlarmaReal(timeInput, status);
}

function solicitarPermiso() {
    if ('Notification' in window) {
        Notification.requestPermission().then(permission => {
            if (permission === 'granted') {
                document.getElementById('permisoBtn').style.display = 'none';
                const timeInput = document.getElementById('alarmTime').value;
                const status = document.getElementById('alarmStatus');
                activarAlarmaReal(timeInput, status);
            } else {
                alert('Necesitás dar permiso de notificaciones para la alarma');
            }
        });
    }
}

function activarAlarmaReal(timeInput, status) {
    const [hours, minutes] = timeInput.split(':');
    const now = new Date();
    let alarmDate = new Date();
    alarmDate.setHours(parseInt(hours), parseInt(minutes), 0, 0);

    if (alarmDate <= now) {
        alarmDate.setDate(alarmDate.getDate() + 1);
    }

    const delay = alarmDate - now;
    
    alarmTimeout = setTimeout(() => {
        mostrarNotificacion();
        scheduleAlarm(timeInput);
    }, delay);

    localStorage.setItem('alarmTime', timeInput);
    status.textContent = `Alarma activada para las ${timeInput}`;
    status.style.display = 'block';
    document.querySelector('.alarm-btn').textContent = 'Desactivar Alarma';
    alarmaActiva = true;
}

function mostrarNotificacion() {
    if (Notification.permission === 'granted') {
        new Notification('Recordatorio de Gastos', {
            body: '¡No olvides registrar tus gastos del día!',
            icon: 'img/icon-192.png',
            tag: 'alarma-gastos'
        });
    } else {
        alert('⏰ ¡Recordatorio! No olvides registrar tus gastos del día');
    }
}

function scheduleAlarm(time) {
    const [hours, minutes] = time.split(':');
    
    const runAlarm = () => {
        const now = new Date();
        const alarmDate = new Date();
        alarmDate.setHours(parseInt(hours), parseInt(minutes), 0, 0);
        
        if (alarmDate <= now) {
            alarmDate.setDate(alarmDate.getDate() + 1);
        }
        
        const delay = alarmDate - now;
        alarmTimeout = setTimeout(() => {
            mostrarNotificacion();
            runAlarm();
        }, delay);
    };
    
    runAlarm();
}

document.addEventListener('DOMContentLoaded', async () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('fecha').value = today;
    
    if ('serviceWorker' in navigator) {
        try {
            await navigator.serviceWorker.register('js/sw.js');
        } catch (e) {
            console.log('SW error:', e);
        }
    }
    
    if ('Notification' in window && Notification.permission === 'default') {
        document.getElementById('permisoBtn').style.display = 'block';
    }
    
    if ('Notification' in window && Notification.permission === 'denied') {
        alert('Las notificaciones están bloqueadas. Por favor habilítalas en Configuración > Safari > Permisos');
    }
    
    gastosCollection.orderBy('id', 'desc').onSnapshot((snapshot) => {
        gastos = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));
        renderGastos();
        actualizarResumen();
    }, (error) => {
        console.error('Error de Firebase:', error);
        alert('Error de Firebase: ' + error.message);
    });
    
    const savedAlarm = localStorage.getItem('alarmTime');
    if (savedAlarm) {
        document.getElementById('alarmTime').value = savedAlarm;
        if (Notification.permission === 'granted') {
            setAlarm();
        }
    }
});
</script>
</body>
</html>
