<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Mensuales</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>💰 Gastos Mensuales</h1>
        
        <div class="alarm-config">
            <h3>⏰ Alarma Diaria</h3>
            <label>Hora del recordatorio:</label>
            <input type="time" id="alarmTime" value="09:00">
            <button class="alarm-btn" onclick="setAlarm()">Activar Alarma</button>
            <div class="alarm-status" id="alarmStatus"></div>
        </div>
        
        <div class="perfiles">
            <button class="perfil-btn active" onclick="selectPerfil('elias')">👤 Elias</button>
            <button class="perfil-btn" onclick="selectPerfil('nadia')">💕 Nadia</button>
        </div>
        
        <div class="form-group">
            <input type="date" id="fecha">
        </div>
        
        <div class="form-group">
            <input type="text" id="descripcion" placeholder="Descripción del gasto">
        </div>
        
        <div class="form-group">
            <input type="number" id="monto" placeholder="Monto" step="0.01">
        </div>
        
        <div class="form-group">
            <select id="tipo">
                <option value="gasto">Gasto</option>
                <option value="ingreso">Ingreso</option>
            </select>
        </div>

        <div class="form-group">
            <select id="categoria">
                <option value="casa">🏠 Casa</option>
                <option value="tarjeta">💳 Tarjeta</option>
                <option value="vehiculo">🚗 Vehículo</option>
                <option value="comida">🍔 Comida</option>
                <option value="salidas">🎉 Salidas</option>
                <option value="gastos innecesarios">❌ Gastos innecesarios</option>
                <option value="gimnasio">💪 Gimnasio</option>
                <option value="otros">📦 Otros</option>
            </select>
        </div>
        
        <button class="btn-agregar" onclick="agregarGasto()">Agregar</button>
        
        <div class="resumen">
            <div class="resumen-item">
                <span>Elias</span>
                <div>Gastos: <strong id="gastosElias" style="color:#ff6b6b">$0</strong></div>
                <div>Ingresos: <strong id="ingresosElias" style="color:#6bff8a">$0</strong></div>
                <strong id="totalElias">$0</strong>
            </div>
            <div class="resumen-item">
                <span>Nadia</span>
                <div>Gastos: <strong id="gastosNadia" style="color:#ff6b6b">$0</strong></div>
                <div>Ingresos: <strong id="ingresosNadia" style="color:#6bff8a">$0</strong></div>
                <strong id="totalNadia">$0</strong>
            </div>
            <div class="resumen-item">
                <span>Total</span>
                <strong id="totalGeneral">$0</strong>
            </div>
        </div>
        
        <div class="gastos-lista" id="gastosLista"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
